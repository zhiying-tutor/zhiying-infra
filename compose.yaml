name: zhiying-dev

services:
  postgres:
    image: postgres:16
    container_name: zhiying-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d postgres"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s
      start_interval: 1s

  rabbitmq:
    image: rabbitmq:4-management
    container_name: zhiying-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
      start_interval: 1s

  minio:
    image: minio/minio:latest
    container_name: zhiying-minio
    restart: unless-stopped
    command: server /data --address ":9100" --console-address ":9101"
    ports:
      - "9100:9100"
      - "9101:9101"
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: devdevdev
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9100/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 1s

  minio-init:
    image: minio/mc:latest
    container_name: zhiying-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9100 dev devdevdev &&
        mc mb -p local/zhiying-content &&
        mc anonymous set download local/zhiying-content

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
